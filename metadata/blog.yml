adjustment:
  banner:
    height: "150px"
    width: "100%" # Keep it as it is to maintain the aspect ratio of the banner image
    absolute_dim: "150px"

  # Adjust the height & width of the post cards. You can also specify an absolute height if needed.
  post:
    height: "50%"
    width: "80%"
    absolute_dim: "320px"
  
banner:
  image: "https://images.unsplash.com/photo-1561570541-aaba21a3ecf0?auto=format&fit=crop"
  alt: Blog Banner
  width: 1200 # The width & height of the banner image. You can adjust this value based on your design needs.
  height: 400


# The list of blog posts. Each post should have a title, date, tags, image, and path to the markdown file. Optionally, you can also include a link and color for styling.
posts:
  - title: Blog Demo
    date: Mar 27, 2026
    tags: [markdown, blog-demo]
    image: https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop
    path: content/blog/blog-demo.md # This should be the path to your markdown file for the blog post. Make sure to place the markdown file in the correct folder.
    color: { background: "#464E7D", text: "white" } # Optional color for styling the post card. You can specify both background and text colors.
  
  - title: Maths Demo
    date: Jan 10, 2026
    tags: [k-fold, ml]
    image: https://images.unsplash.com/photo-1708011271935-3e109df56fe0?auto=format&fit=crop
    path: content/blog/maths-demo.md
    color: { background: "#D9D9D9", text: "black" }
  
  - title: A third blog post
    date: Mar 5, 2024
    tags: [coding, tips]
    image: https://images.unsplash.com/photo-1707135719639-409915fbc68f?auto=format&fit=crop
    link: /tsr-page/
    color: { background: "#D9D9D9", text: "black" }

  - title: A fourth blog post
    date: Apr 15, 2024
    tags: [lifestyle]
    image: assets/blog/image.jpg # You can also use a local image by providing the path relative to the root of your project. Make sure to place the image in the correct folder.
    link: /tsr-page/ # You can also use an external link.